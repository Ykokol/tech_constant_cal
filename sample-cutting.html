<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不规则样品智能分割</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2b2b2b">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>不规则样品智能分割</h1>
        </header>
        
        <nav>
            <a href="javascript:void(0);" onclick="navigateTo('index.html')" class="nav-btn">返回首页</a>
        </nav>
        
        <main>
            <div class="controls-container">
                <div class="control-group">
                    <h2>参数输入</h2>
                    <div class="form-group">
                        <label>1. 导入边角料</label>
                        <div style="display: flex; gap: 10px; margin-top: 5px;">
                            <button id="openCameraBtn" class="btn" style="flex: 1; background-color: #2196F3; color: white;">📷 直接拍照</button>
                            <input type="file" id="stockImage" accept="image/*" style="flex: 1;">
                        </div>
                    </div>
                    <hr>
                    <div class="form-group">
                        <label>2. 设定比例尺</label>
                        <p class="instructions">在右侧图上点击两点, 然后在弹窗中输入实际距离(mm)。</p>
                        <button class="btn" id="setScaleBtn">开始设定比例尺</button>
                        <p id="scaleInfo"></p>
                    </div>
                    <hr>
                    <div class="form-group">
                        <label for="stockThickness">3. 原料厚度 (mm)</label>
                        <input type="number" id="stockThickness" value="3.0" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="sampleThickness">4. 样品厚度 (mm)</label>
                        <input type="number" id="sampleThickness" value="1.0" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="sampleWidth">5. 样品宽度 (mm)</label>
                        <input type="number" id="sampleWidth" value="20" step="1">
                    </div>
                     <div class="form-group">
                        <label for="sampleHeight">6. 样品高度 (mm)</label>
                        <input type="number" id="sampleHeight" value="30" step="1">
                    </div>
                    <button class="btn btn-primary" id="calculateBtn">计算最终方案</button>
                </div>
                <div class="results-group">
                    <h2>计算结果</h2>
                    <div id="spinner" class="spinner" style="display: none;"></div>
                    <div id="cuttingResult" class="result"></div>
                </div>
            </div>

            <div class="canvas-container">
                <h2 id="canvasTitle">请先导入图片</h2>
                <canvas id="previewCanvas"></canvas>
            </div>
        </main>
        
        <footer>
            <p>© 2026 工程常数计算工具</p>
        </footer>
    </div>

    <div id="cameraModal" class="camera-modal">
        <video id="cameraVideo" autoplay playsinline></video>
        
        <div class="camera-grid">
            <div></div><div></div><div></div>
            <div></div><div></div><div></div>
            <div></div><div></div><div></div>
        </div>

        <div class="camera-tips">
            <p>💡 提示：请俯拍 | 背景颜色单一(如无尘布) | 避免强反光与阴影</p>
            <p>请将边角料的直边尽量对齐网格线</p>
        </div>

        <div class="camera-controls">
            <button id="closeCameraBtn" class="camera-btn close-btn">取消</button>
            <button id="takePhotoBtn" class="camera-btn capture-btn"></button>
            <div style="width: 60px;"></div> </div>
    </div>
    
    <script src="navigation.js"></script>
    <script src="script.js"></script>
</body>
</html>
